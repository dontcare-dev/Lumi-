<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discord Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090B;
    --surface: #111113;
    --surface2: #18181B;
    --border: rgba(255,255,255,0.07);
    --primary: #5865F2;
    --accent: #8B5CF6;
    --green: #23A55A;
    --yellow: #F0B232;
    --red: #F23F42;
    --text: #FAFAFA;
    --muted: #A1A1AA;
    --spotify: #1DB954;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
  }

  html { scroll-behavior: smooth; overflow-x: hidden; }
  body { overflow-x: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    max-width: 100vw;
    font-size: 15px;
    line-height: 1.6;
  }



  /* ── Noise overlay ── */
  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  /* ── Layout ── */
  .page { position: relative; z-index: 2; }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── Hero ── */
  .hero {
    padding: 80px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    width: 130px; height: 130px;
    margin-bottom: 24px;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  .avatar-ring {
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--primary), var(--accent), #3B82F6, var(--primary));
    animation: spinRing 6s linear infinite;
    padding: 3px;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  .avatar-ring-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--bg);
  }
  .avatar-img {
    position: absolute;
    inset: 4px;
    width: calc(100% - 8px);
    height: calc(100% - 8px);
    border-radius: 50%;
    object-fit: cover;
    background: var(--surface2);
  }
  .status-dot {
    position: absolute;
    bottom: 6px; right: 6px;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 3px solid var(--bg);
    background: var(--green);
    transition: background 0.4s;
    z-index: 10;
  }
  .status-dot.idle { background: var(--yellow); }
  .status-dot.dnd { background: var(--red); }
  .status-dot.offline { background: #4e5058; }

  .hero-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.7s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .hero-tag {
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    animation: fadeUp 0.7s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    margin-bottom: 16px;
  }
  .hero-status-text {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 0.82rem;
    color: var(--muted);
    animation: fadeUp 0.7s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    margin-bottom: 28px;
    backdrop-filter: blur(8px);
  }
  .hero-status-text .dot-live {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.85)} }

  .hero-actions {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp 0.7s 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 0.83rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: #4752c4; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(88,101,242,0.35); }
  .btn-ghost {
    background: var(--glass);
    color: var(--text);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(8px);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); transform: translateY(-1px); }

  /* ── Badge row ── */
  .badges-row {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    margin-top: 20px;
    animation: fadeUp 0.7s 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.75rem;
    color: var(--muted);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
  }
  .badge:hover { color: var(--text); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
  .badge svg { width: 13px; height: 13px; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding-bottom: 80px;
  }
  @media(max-width: 640px) { .grid { grid-template-columns: 1fr; } }

  .col-full { grid-column: 1 / -1; }

  /* ── Cards ── */
  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  }
  .card:hover { border-color: rgba(255,255,255,0.13); transform: translateY(-2px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

  .card-delay-1 { animation-delay: 0.1s; }
  .card-delay-2 { animation-delay: 0.2s; }
  .card-delay-3 { animation-delay: 0.3s; }
  .card-delay-4 { animation-delay: 0.4s; }
  .card-delay-5 { animation-delay: 0.5s; }

  .card-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 7px;
  }
  .card-label svg { width: 13px; height: 13px; opacity: 0.7; }

  /* ── Skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── About me card ── */
  .about-text { color: var(--muted); line-height: 1.75; font-size: 0.9rem; }

  /* ── Activity card ── */
  .activity-wrap { display: flex; gap: 14px; align-items: flex-start; }
  .activity-img {
    width: 64px; height: 64px; border-radius: 12px;
    object-fit: cover; background: var(--surface2); flex-shrink: 0;
  }
  .activity-info { flex: 1; min-width: 0; }
  .activity-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .activity-detail { font-size: 0.8rem; color: var(--muted); margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .activity-progress-wrap { margin-top: 10px; }
  .activity-progress-bar {
    height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden;
  }
  .activity-progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 10px; transition: width 1s linear;
  }
  .activity-time { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

  /* ── Spotify card ── */
  .spotify-card { background: linear-gradient(135deg, rgba(29,185,84,0.07), rgba(29,185,84,0.02)); }
  .spotify-inner { display: flex; gap: 16px; align-items: center; }
  .spotify-art {
    width: 76px; height: 76px; border-radius: 10px; flex-shrink: 0;
    object-fit: cover; background: var(--surface2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: albumPulse 3s ease-in-out infinite;
  }
  @keyframes albumPulse { 0%,100%{box-shadow:0 8px 24px rgba(0,0,0,0.4)} 50%{box-shadow:0 8px 32px rgba(29,185,84,0.25)} }
  .spotify-info { flex: 1; min-width: 0; }
  .spotify-track {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 1rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .spotify-artist { font-size: 0.82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .spotify-album { font-size: 0.75rem; color: rgba(161,161,170,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spotify-icon { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .spotify-icon svg { width: 18px; height: 18px; }
  .spotify-progress { margin-top: 12px; }
  .spotify-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
  .spotify-fill { height: 100%; background: var(--spotify); border-radius: 10px; transition: width 1s linear; }
  .spotify-times { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

  /* Equalizer bars (animated when playing) */
  .eq { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
  .eq-bar { width: 3px; border-radius: 2px; background: var(--spotify); }
  .eq-bar:nth-child(1) { animation: eqBounce 0.8s ease-in-out infinite; }
  .eq-bar:nth-child(2) { animation: eqBounce 0.8s ease-in-out infinite 0.15s; }
  .eq-bar:nth-child(3) { animation: eqBounce 0.8s ease-in-out infinite 0.3s; }
  .eq-bar:nth-child(4) { animation: eqBounce 0.8s ease-in-out infinite 0.05s; }
  @keyframes eqBounce { 0%,100%{height:4px} 50%{height:13px} }

  /* ── Stats card ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.05); }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; margin-bottom: 2px; }
  .stat-label { font-size: 0.74rem; color: var(--muted); letter-spacing: 0.02em; }
  .stat-value.primary { color: var(--primary); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }
  .stat-value.spotify { color: var(--spotify); }

  /* ── Clock card ── */
  .clock-display {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--text), var(--muted));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }
  .clock-date { font-size: 0.8rem; color: var(--muted); }
  .clock-tz { font-size: 0.72rem; color: rgba(161,161,170,0.5); margin-top: 2px; }

  /* ── ID card ── */
  .id-display {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 12px 14px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .id-display:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .id-copy { font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .snowflake-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sf-item { background: rgba(255,255,255,0.02); border-radius: 8px; padding: 10px; }
  .sf-key { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; letter-spacing: 0.03em; }
  .sf-val { font-size: 0.82rem; font-weight: 500; }

  /* ── Connected accounts ── */
  .accounts-list { display: flex; flex-direction: column; gap: 8px; }
  .account-item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px 14px;
    transition: all 0.2s;
  }
  .account-item:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); }
  .account-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .account-name { font-weight: 500; font-size: 0.88rem; }
  .account-type { font-size: 0.75rem; color: var(--muted); text-transform: capitalize; }

  /* ── No data placeholders ── */
  .no-data { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 20px 0; opacity: 0.6; }

  /* ── Presence history mini graph ── */
  .presence-graph { display: flex; align-items: flex-end; gap: 4px; height: 48px; margin-top: 8px; }
  .pg-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 6px; transition: height 0.5s; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 0.83rem;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
    z-index: 1000;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast-check { color: var(--green); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Banner ── */
  .banner-wrap {
    width: 100%; height: 160px; overflow: hidden;
    position: relative; border-radius: 20px 20px 0 0;
    background: linear-gradient(135deg, #1a1b2e, #16213e, #0f3460);
    margin-bottom: -60px;
    animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  .banner-img { width: 100%; height: 100%; object-fit: cover; }
  .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(9,9,11,0.7)); }

  /* Banner gradient fallback */
  .banner-gradient {
    width: 100%; height: 100%;
    background: linear-gradient(135deg,
      rgba(88,101,242,0.5) 0%,
      rgba(139,92,246,0.4) 40%,
      rgba(59,130,246,0.3) 100%);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

  /* ── Status badge text ── */
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 500;
  }
  .status-badge.online { background: rgba(35,165,90,0.15); color: var(--green); border: 1px solid rgba(35,165,90,0.25); }
  .status-badge.idle { background: rgba(240,178,50,0.15); color: var(--yellow); border: 1px solid rgba(240,178,50,0.25); }
  .status-badge.dnd { background: rgba(242,63,66,0.15); color: var(--red); border: 1px solid rgba(242,63,66,0.25); }
  .status-badge.offline { background: rgba(78,80,88,0.15); color: #7d8089; border: 1px solid rgba(78,80,88,0.25); }

  /* ── Platform icons ── */
  .platform-row { display: flex; gap: 8px; margin-top: 12px; }
  .platform-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 8px;
    font-size: 0.72rem; color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .platform-chip svg { width: 11px; height: 11px; }

</style>
</head>
<body>

<canvas id="starfield" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
<div class="noise"></div>

<div class="page">
  <!-- Banner -->
  <div class="container">
    <div class="banner-wrap" id="bannerWrap">
      <div class="banner-gradient" id="bannerInner"></div>
      <div class="banner-overlay"></div>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="avatar-wrap">
      <div class="avatar-ring"><div class="avatar-ring-inner"></div></div>
      <img id="avatarImg" class="avatar-img" src="" alt="Avatar"/>
      <div class="status-dot offline" id="statusDot"></div>
    </div>

    <h1 class="hero-name" id="heroName">
      <span class="skeleton" style="display:inline-block;width:180px;height:1em;border-radius:8px;"></span>
    </h1>
    <div class="hero-tag" id="heroTag">Fetching profile…</div>

    <div class="hero-status-text" id="heroStatusWrap">
      <span class="dot-live"></span>
      <span id="heroStatusText">Loading…</span>
    </div>

    <div class="hero-actions">
      <button class="btn btn-primary" onclick="copyID()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy Discord ID
      </button>
      <button class="btn btn-ghost" onclick="shareProfile()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share Profile
      </button>
    </div>

    <div class="badges-row" id="badgesRow"></div>
  </div>

  <!-- Cards Grid -->
  <div class="container">
    <div class="grid">

      <!-- About Me -->
      <div class="card card-delay-1" id="aboutCard">
        <div class="card-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          About Me
        </div>
        <p class="about-text" id="aboutText">
          <span class="skeleton" style="display:block;height:1em;margin-bottom:8px;"></span>
          <span class="skeleton" style="display:block;height:1em;width:80%;"></span>
        </p>
      </div>

      <!-- Real-time Clock -->
      <div class="card card-delay-2" id="clockCard">
        <div class="card-label">

// ─── Snowflake decoder ───────────────────────────────────────────
function decodeSnowflake(id) {
  const bigId = BigInt(id);
  const EPOCH = BigInt(1420070400000);
  const timestamp = (bigId >> BigInt(22)) + EPOCH;
  const workerId = (bigId & BigInt(0x3E0000)) >> BigInt(17);
  const processId = (bigId & BigInt(0x1F000)) >> BigInt(12);
  const increment = bigId & BigInt(0xFFF);
  const date = new Date(Number(timestamp));
  return { timestamp: date, workerId, processId, increment };
}

function renderSnowflake() {
  const sf = decodeSnowflake(USER_ID);
  const container = document.getElementById('snowflakeInfo');
  const created = sf.timestamp.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  const time = sf.timestamp.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  container.innerHTML = `
    <div class="sf-item"><div class="sf-key">Created</div><div class="sf-val">${created}</div></div>
    <div class="sf-item"><div class="sf-key">Time (UTC)</div><div class="sf-val">${time}</div></div>
    <div class="sf-item"><div class="sf-key">Worker ID</div><div class="sf-val">${sf.workerId}</div></div>
    <div class="sf-item"><div class="sf-key">Increment</div><div class="sf-val">${sf.increment}</div></div>
  `;
  document.getElementById('statMember').textContent = sf.timestamp.getFullYear();
}
renderSnowflake();

// ─── Clock ───────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockDisplay').textContent = `${h}:${m}:${s}`;
  document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  document.getElementById('clockTZ').textContent = `Timezone: ${tz}`;
}
updateClock();
setInterval(updateClock, 1000);

// ─── Avatar URL ──────────────────────────────────────────────────
function avatarUrl(data) {
  if (data.discord_user.avatar) {
    const ext = data.discord_user.avatar.startsWith('a_') ? 'gif' : 'png';
    return `https://cdn.discordapp.com/avatars/${USER_ID}/${data.discord_user.avatar}.${ext}?size=256`;
  }
  const disc = parseInt(data.discord_user.discriminator) % 5;
  return `https://cdn.discordapp.com/embed/avatars/${disc}.png`;
}

  document.getElementById('statStatus').className = `stat-value ${status === 'online' ? 'green' : status === 'idle' ? '' : status === 'dnd' ? '' : 'primary'}`;
}

// ─── Time format ─────────────────────────────────────────────────
function fmtMs(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ─── Render Spotify ──────────────────────────────────────────────
function renderSpotify(spotify) {
  if (!spotify) { document.getElementById('spotifyCard').style.display = 'none'; document.getElementById('statSpotify').textContent = 'Offline'; return; }
  document.getElementById('spotifyCard').style.display = 'block';
  document.getElementById('spotifyArt').src = spotify.album_art_url || '';
  document.getElementById('spotifyTrack').textContent = spotify.song || '—';
  document.getElementById('spotifyArtist').textContent = spotify.artist || '—';
  document.getElementById('spotifyAlbum').textContent = spotify.album || '—';
  document.getElementById('statSpotify').textContent = '♪ Playing';

  const total = spotify.timestamps.end - spotify.timestamps.start;
  document.getElementById('spotifyTotal').textContent = fmtMs(total);

  if (spotifyInterval) clearInterval(spotifyInterval);
  spotifyInterval = setInterval(() => {
    const elapsed = Date.now() - spotify.timestamps.start;
    const pct = Math.min(100, (elapsed / total) * 100);
    document.getElementById('spotifyFill').style.width = pct + '%';
    document.getElementById('spotifyElapsed').textContent = fmtMs(elapsed);
    if (elapsed >= total) clearInterval(spotifyInterval);
  }, 1000);
}

// ─── Render Activity ─────────────────────────────────────────────
function renderActivities(activities) {
  const non_spotify = activities.filter(a => a.type !== 2);
  document.getElementById('statActivities').textContent = non_spotify.length;
  const card = document.getElementById('activityCard');
  const wrap = document.getElementById('activityWrap');
  if (!non_spotify.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  const a = non_spotify[0];

  let imgSrc = '';
  if (a.assets && a.assets.large_image) {
    if (a.assets.large_image.startsWith('mp:external')) {
      imgSrc = `https://media.discordapp.net/${a.assets.large_image.replace('mp:', '')}`;
    } else {
      imgSrc = `https://cdn.discordapp.com/app-assets/${a.application_id}/${a.assets.large_image}.png`;
    }
  }

  let timeStr = '';
  let progressHtml = '';
  if (a.timestamps) {
    if (a.timestamps.start && a.timestamps.end) {
      const total = a.timestamps.end - a.timestamps.start;
      const elapsed = Date.now() - a.timestamps.start;
      const pct = Math.min(100, (elapsed / total) * 100);
      timeStr = `${fmtMs(elapsed)} / ${fmtMs(total)}`;
      progressHtml = `<div class="activity-progress-wrap">
        <div class="activity-progress-bar"><div class="activity-progress-fill" style="width:${pct}%"></div></div>
        <div class="activity-time"><span>${fmtMs(elapsed)}</span><span>${fmtMs(total)}</span></div>
      </div>`;
    } else if (a.timestamps.start) {
      const elapsed = Date.now() - a.timestamps.start;
      timeStr = fmtMs(elapsed) + ' elapsed';
    }
  }

  wrap.innerHTML = `
    ${imgSrc ? `<img src="${imgSrc}" class="activity-img" alt=""/>` : `<div class="activity-img" style="display:flex;align-items:center;justify-content:center;font-size:1.8rem;">${a.emoji?.name || '🎮'}</div>`}
    <div class="activity-info">
      <div class="activity-name">${escHtml(a.name)}</div>
      ${a.details ? `<div class="activity-detail">${escHtml(a.details)}</div>` : ''}
      ${a.state ? `<div class="activity-detail" style="opacity:0.7">${escHtml(a.state)}</div>` : ''}
      ${progressHtml}
      ${!progressHtml && timeStr ? `<div class="activity-detail" style="margin-top:6px;opacity:0.6">${timeStr}</div>` : ''}
    </div>`;
}

  if (clientStatus.mobile) platforms.push({ name: 'Mobile', icon: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>`, status: clientStatus.mobile });
  if (clientStatus.web) platforms.push({ name: 'Web', icon: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`, status: clientStatus.web });
  row.innerHTML = platforms.map(p =>
    `<div class="platform-chip" style="color:${STATUS_COLORS[p.status] || 'var(--muted)'}">${p.icon} ${p.name}</div>`
  ).join('');
}

// ─── Main render ─────────────────────────────────────────────────
function renderData(d) {
  presenceData = d;

  // Avatar
  const img = document.getElementById('avatarImg');
  img.src = avatarUrl(d);
  img.onerror = () => { img.src = 'https://cdn.discordapp.com/embed/avatars/0.png'; };

  // Name
  const nameEl = document.getElementById('heroName');
  const displayName = d.discord_user.global_name || d.discord_user.username;
  nameEl.innerHTML = escHtml(displayName);

  // Tag
  const disc = d.discord_user.discriminator;
  const tag = disc === '0' || !disc ? `@${d.discord_user.username}` : `${d.discord_user.username}#${disc}`;
  document.getElementById('heroTag').textContent = tag;

  // Banner
  if (d.discord_user.banner) {
    const ext = d.discord_user.banner.startsWith('a_') ? 'gif' : 'png';
    const url = `https://cdn.discordapp.com/banners/${USER_ID}/${d.discord_user.banner}.${ext}?size=480`;
    document.getElementById('bannerInner').innerHTML = `<img src="${url}" class="banner-img" alt="banner"/>`;
  } else if (d.discord_user.banner_color) {
    document.getElementById('bannerInner').style.background = d.discord_user.banner_color;
  }

  // Status & activities
  applyStatus(d.discord_status);
  renderActivities(d.activities || []);
  renderSpotify(d.listening_to_spotify ? d.spotify : null);
  renderBadges(d);
  renderConnectedAccounts(d.discord_user.connected_accounts || []);
  renderPlatforms(d.active_on_discord_desktop !== undefined ? {
    desktop: d.active_on_discord_desktop ? (d.discord_status) : null,
    mobile: d.active_on_discord_mobile ? (d.discord_status) : null,
    web: d.active_on_discord_web ? (d.discord_status) : null,
  } : null);

  // About me
  document.getElementById('aboutText').innerHTML = `17yo developer — I build not cool stuff`;

  // Spotify stat
  if (!d.listening_to_spotify) {
    document.getElementById('statSpotify').textContent = 'Offline';
  }
}

// ─── Escape HTML ─────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Fetch initial data ──────────────────────────────────────────
async function fetchInitial() {
  try {
    const res = await fetch(API);
    const json = await res.json();
    if (json.success) renderData(json.data);
  } catch(e) {
    document.getElementById('heroTag').textContent = 'Could not reach Lanyard API';
  }
}

// ─── WebSocket ───────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  let heartbeatInterval = null;

  ws.onopen = () => {};

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.op === 1) {
      heartbeatInterval = setInterval(() => {
        ws.send(JSON.stringify({ op: 3 }));
      }, msg.d.heartbeat_interval);
      ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: USER_ID } }));
    }
    if (msg.op === 0) {
      if (msg.t === 'INIT_STATE' || msg.t === 'PRESENCE_UPDATE') {
        const data = msg.d[USER_ID] || msg.d;
        if (data && data.discord_user) renderData(data);
      }
    }
  };

  ws.onclose = () => {
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

// ─── Toast ───────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function copyID() {
  navigator.clipboard.writeText(USER_ID).then(() => showToast('Discord ID copied!')).catch(() => {
    prompt('Copy this ID:', USER_ID);
  });
}

function shareProfile() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: 'Discord Profile', url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('Profile URL copied!'));
  }
}

// ─── Boot ────────────────────────────────────────────────────────
fetchInitial();
connectWS();


// ─── STARFIELD ────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  const STAR_COUNT = 220;
  let stars = [];
  let W, H;

  const STAR_COLORS = [
    'rgba(255,255,255,',
    'rgba(180,190,255,',
    'rgba(200,180,255,',
    'rgba(180,220,255,',
    'rgba(255,200,200,',
  ];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      const size = Math.random() < 0.12 ? Math.random() * 2.2 + 1.2 : Math.random() * 1.2 + 0.2;
      const glowy = size > 1.5;
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size,
        color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)],
        baseOpacity: Math.random() * 0.5 + 0.15,
        opacity: 0,
        twinkleSpeed: Math.random() * 0.008 + 0.002,
        twinkleOffset: Math.random() * Math.PI * 2,
        glowy,
        glowRadius: size * (Math.random() * 5 + 4),
        drift: (Math.random() - 0.5) * 0.006,
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.016;

    for (const s of stars) {
      s.x += s.drift;
      if (s.x < 0) s.x = 0, s.drift *= -1;
      if (s.x > W) s.x = W, s.drift *= -1;

      const twinkle = Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset);
      s.opacity = s.baseOpacity + twinkle * s.baseOpacity * 0.5;
      s.opacity = Math.max(0.02, Math.min(1, s.opacity));

      if (s.glowy) {
        const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.glowRadius);
        grad.addColorStop(0, s.color + (s.opacity * 0.6).toFixed(2) + ')');
        grad.addColorStop(0.4, s.color + (s.opacity * 0.15).toFixed(2) + ')');
        grad.addColorStop(1, s.color + '0)');
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.glowRadius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = s.color + s.opacity.toFixed(2) + ')';
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  draw();
  window.addEventListener('resize', () => { resize(); initStars(); });
})();

// ─── CHAOS GLOW SYSTEM ───────────────────────────────────────────
const GLOW_COLORS = [
  '#5865F2','#8B5CF6','#3B82F6','#06B6D4','#10B981',
  '#F59E0B','#EF4444','#EC4899','#A3E635','#F97316',
  '#E879F9','#38BDF8','#fb7185','#34d399',
];

function randomBetween(a, b) { return a + Math.random() * (b - a); }

// Floating glow blobs that appear and fade randomly
function spawnGlowBlob() {
  const blob = document.createElement('div');
  const color = GLOW_COLORS[Math.floor(Math.random() * GLOW_COLORS.length)];
  const size = randomBetween(40, 160);
  const x = randomBetween(0, window.innerWidth - size);
  const y = randomBetween(0, document.body.scrollHeight - size);
  const duration = randomBetween(1200, 3000);

  blob.style.cssText = `
    position:absolute;
    left:${x}px; top:${y}px;
    width:${size}px; height:${size}px;
    border-radius:50%;
    background:${color};
    filter:blur(${size * 0.55}px);
    opacity:0;
    pointer-events:none;
    z-index:1;
    transition: opacity ${duration * 0.35}ms ease, transform ${duration}ms ease;
    transform: scale(0.5);
  `;
  document.body.appendChild(blob);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      blob.style.opacity = randomBetween(0.04, 0.13);
      blob.style.transform = `scale(${randomBetween(0.9, 1.4)})`;
    });
  });

  setTimeout(() => {
    blob.style.opacity = '0';
    blob.style.transform = 'scale(0.3)';
    setTimeout(() => blob.remove(), duration * 0.5);
  }, duration * 0.6);
}

// Spark dots that shoot across the screen
function spawnSpark() {
  const spark = document.createElement('div');
  const color = GLOW_COLORS[Math.floor(Math.random() * GLOW_COLORS.length)];
  const size = randomBetween(3, 9);
  const startX = randomBetween(0, window.innerWidth);
  const startY = randomBetween(0, window.innerHeight) + window.scrollY;
  const dx = randomBetween(-200, 200);
  const dy = randomBetween(-200, 200);
  const dur = randomBetween(600, 1400);

  spark.style.cssText = `
    position:absolute;
    left:${startX}px; top:${startY}px;
    width:${size}px; height:${size}px;
    border-radius:50%;
    background:${color};
    box-shadow: 0 0 ${size * 1.5}px ${size * 0.4}px ${color};
    opacity:0;
    pointer-events:none;
    z-index:3;
    transition: opacity ${dur * 0.2}ms ease, transform ${dur}ms cubic-bezier(0.25,0.46,0.45,0.94);
  `;
  document.body.appendChild(spark);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      spark.style.opacity = '1';
      spark.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
    });
  });

  setTimeout(() => spark.remove(), dur + 100);
}

// Glowing border flash on random cards
function flashRandomCard() {
  const cards = document.querySelectorAll('.card');
  if (!cards.length) return;
  const card = cards[Math.floor(Math.random() * cards.length)];
  const color = GLOW_COLORS[Math.floor(Math.random() * GLOW_COLORS.length)];
  const prev = card.style.boxShadow;
  const prevBorder = card.style.borderColor;
  card.style.transition = 'box-shadow 0.3s, border-color 0.3s';
  card.style.boxShadow = `0 0 18px 2px ${color}22, 0 0 40px 4px ${color}0d`;
  card.style.borderColor = color + '33';
  setTimeout(() => {
    card.style.boxShadow = prev;
    card.style.borderColor = prevBorder;
  }, randomBetween(300, 900));
}

// Random glow ring around avatar
function flashAvatarRing() {
  const ring = document.querySelector('.avatar-ring');
  if (!ring) return;
  const c1 = GLOW_COLORS[Math.floor(Math.random() * GLOW_COLORS.length)];
  const c2 = GLOW_COLORS[Math.floor(Math.random() * GLOW_COLORS.length)];
  ring.style.background = `conic-gradient(from 0deg, ${c1}, ${c2}, ${c1})`;
  setTimeout(() => {
    ring.style.background = 'conic-gradient(from 0deg, var(--primary), var(--accent), #3B82F6, var(--primary))';
  }, randomBetween(400, 1200));
}

// Glowing text flash on hero name
function flashHeroName() {
  const el = document.getElementById('heroName');
  if (!el) return;
  const color = GLOW_COLORS[Math.floor(Math.random() * GLOW_COLORS.length)];
  el.style.transition = 'text-shadow 0.2s';
  el.style.textShadow = `0 0 12px ${color}66, 0 0 24px ${color}33`;
  setTimeout(() => { el.style.textShadow = 'none'; }, randomBetween(200, 700));
}

// Random stat value glow
function flashStat() {
  const stats = document.querySelectorAll('.stat-value');
  if (!stats.length) return;
  const el = stats[Math.floor(Math.random() * stats.length)];
  const color = GLOW_COLORS[Math.floor(Math.random() * GLOW_COLORS.length)];
  const prev = el.style.textShadow;
  el.style.transition = 'text-shadow 0.25s';
  el.style.textShadow = `0 0 8px ${color}55`;
  setTimeout(() => { el.style.textShadow = prev; }, randomBetween(300, 800));
}

// Chaos scheduler — fires random effects at random intervals
function scheduleNextChaos() {
  const delay = randomBetween(80, 500);
  setTimeout(() => {
    const roll = Math.random();
    if (roll < 0.30) spawnGlowBlob();
    else if (roll < 0.55) spawnSpark();
    else if (roll < 0.70) flashRandomCard();
    else if (roll < 0.80) flashAvatarRing();
    else if (roll < 0.90) flashHeroName();
    else flashStat();
    scheduleNextChaos();
  }, delay);
}

// Occasional burst of multiple sparks
function spawnBurst() {
  const count = Math.floor(randomBetween(4, 12));
  for (let i = 0; i < count; i++) {
    setTimeout(spawnSpark, i * randomBetween(20, 80));
  }
  setTimeout(spawnBurst, randomBetween(2000, 6000));
}

scheduleNextChaos();
spawnBurst();
</script>
